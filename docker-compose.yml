version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: opticontent-mongodb
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      # Bạn có thể thêm cấu hình xác thực nếu cần:
      # MONGO_INITDB_ROOT_USERNAME: admin
      # MONGO_INITDB_ROOT_PASSWORD: password123
      - MONGO_INITDB_DATABASE=opticontent

volumes:
  mongodb_data:
    name: opticontent_mongodb_data
    driver: local
